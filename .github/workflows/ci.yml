name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**", "chore/**"]
  pull_request:

# Cancela execuções antigas do mesmo ref quando chega um push novo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend · pytest
    runs-on: ubuntu-latest
    env:
      # Os testes de API usam SQLite via fixtures (tmp_path); este default só
      # evita que o engine de módulo tente Postgres no import. Sem Postgres no CI.
      DATABASE_URL: "sqlite:///./ci.db"
      JWT_SECRET_KEY: "ci-secret"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Instalar pacote (api + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[api,dev]"
      - name: Rodar testes
        # Testes de analytics que dependem do gold (data/, gitignored) usam
        # skipif e são pulados no CI — o resto roda em SQLite.
        run: pytest -q

  frontend:
    name: Frontend · typecheck + lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Instalar dependências
        run: npm ci
      - name: Typecheck (bloqueante)
        run: npx tsc --noEmit
      - name: Lint (informativo, não bloqueia)
        # Há débito de lint pré-existente (regras novas do Next 16/React 19).
        # Reporta sem quebrar o CI; tornar bloqueante após limpar.
        run: npm run lint
        continue-on-error: true

  deploy:
    name: Deploy · VM Oracle
    needs: [backend, frontend]
    # só na main e só em push (não em PR); exige backend+frontend verdes.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Redeploy via SSH (git pull + docker compose)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.VM_APP_DIR }}"
            git fetch --all
            git reset --hard origin/main
            docker compose --env-file infra/.env -f infra/docker-compose.yml up -d --build
            docker image prune -f
