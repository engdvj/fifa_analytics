# Fonte ÚNICA: API oficial da FIFA (v3 + Data Hub). Sem fontes de terceiros.
# As fontes legadas (worldcup2026, wikipedia, espn, 365scores, balldontlie,
# api_football, football_data, sample) foram removidas na refundação FIFA-only.
sources:
  fifa:
    enabled: true
    official: true
    requires_api_key: false
    role: fonte_unica_oficial
    competition:
      id_competition: 17
      id_season: 285023
    base_urls:
      data_api_v3: https://api.fifa.com/api/v3
      data_hub: https://fdh-api.fifa.com/v1
    endpoints:
      calendar_matches: /calendar/matches?idCompetition=17&idSeason=285023&language=en&count=200
      match_live: /live/football/17/285023/{idStage}/{idMatch}?language=en
      match_timeline: /timelines/17/285023/{idStage}/{idMatch}?language=en
      match_team_stats: /stats/match/{IdIFES}/teams.json
      match_player_stats: /stats/match/{IdIFES}/players.json
      power_ranking_season: /powerranking/season/285023.json
    observacao: >-
      APIs públicas sem chave e sem autenticação; basta User-Agent de browser
      (configurado em fifa/client.py). IdIFES vem em Properties.IdIFES do
      calendar/matches.
