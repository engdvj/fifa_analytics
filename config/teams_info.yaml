# Informações curadas das seleções da Copa do Mundo 2026.
#
# NÃO vem de nenhuma fonte do pipeline — é conhecimento público preenchido à mão.
# Editável: corrija técnico/dados desatualizados aqui e rode `fifa-analytics scores`
# (ou o passo de HTML) para refletir na aba Seleções.
#
# Campos por seleção (todos opcionais — o card mostra só os preenchidos):
#   apelido        — como a seleção é conhecida
#   confederacao   — UEFA, CONMEBOL, CAF, AFC, CONCACAF, OFC
#   tecnico        — técnico atual (pode mudar; revise)
#   titulos_copa   — nº de títulos da Copa do Mundo
#   vices_copa     — nº de vice-campeonatos da Copa do Mundo
#   participacoes  — nº de participações em Copas (incl. 2026)
#   estreia        — ano da 1ª participação em Copas
#   melhor_campanha— melhor resultado histórico em Copas
#   curiosidade    — uma nota/curiosidade sobre a seleção

