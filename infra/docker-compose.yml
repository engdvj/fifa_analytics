# Stack local da plataforma (e base do deploy na VM Oracle).
# Sobe Postgres + API. O frontend (web/) entra como serviço numa fase futura.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fifa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fifa}
      POSTGRES_DB: ${POSTGRES_DB:-fifa}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fifa}"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: api/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-fifa}:${POSTGRES_PASSWORD:-fifa}@db:5432/${POSTGRES_DB:-fifa}
    ports:
      - "8000:8000"
    volumes:
      # gold parquet é lido pela API (stats) e pelo loader.
      - ../data:/app/data
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
