# Stack da plataforma: Caddy (HTTPS) + Postgres + API + Frontend.
# Build na própria máquina (sem registry). Em produção, rode com:
#   docker compose --env-file infra/.env -f infra/docker-compose.yml up -d --build
# As variáveis (senhas, JWT, URLs) vêm de infra/.env (ver infra/DEPLOY.md).
# Só o Caddy expõe portas (80/443); API e Web ficam internos na rede do compose.
services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fifa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fifa}
      POSTGRES_DB: ${POSTGRES_DB:-fifa}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fifa}"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-fifa}:${POSTGRES_PASSWORD:-fifa}@db:5432/${POSTGRES_DB:-fifa}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?defina JWT_SECRET_KEY em infra/.env}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_NAME: ${ADMIN_NAME:-Admin}
      # Coleta automática dirigida pelo calendário: checa o calendário oficial a
      # cada N minutos e só coleta quando um jogo vira "finalizado" (0 = desligado).
      AUTO_COLLECT_MINUTES: ${AUTO_COLLECT_MINUTES:-15}
      # Folga após detectar fim de jogo, p/ as stats avançadas (fdh) publicarem.
      AUTO_COLLECT_GRACE_MINUTES: ${AUTO_COLLECT_GRACE_MINUTES:-10}
    volumes:
      # gold parquet é lido pela API (stats) e pelo loader.
      - ../data:/app/data
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        # embutido no bundle do browser — aponte para a API pública (https).
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    restart: unless-stopped
    depends_on:
      - api

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api

volumes:
  pgdata:
  caddy_data:
  caddy_config:
